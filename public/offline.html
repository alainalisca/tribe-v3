<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Tribe — Offline</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #272D34;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    padding-top: calc(env(safe-area-inset-top, 0px) + 24px);
    -webkit-font-smoothing: antialiased;
  }
  .container {
    text-align: center;
    max-width: 360px;
    width: 100%;
  }
  .logo {
    font-size: 48px;
    font-weight: 900;
    letter-spacing: -1.5px;
    margin-bottom: 40px;
  }
  .dot { color: #C0E863; }
  .icon {
    font-size: 56px;
    margin-bottom: 24px;
    display: block;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 10px;
    line-height: 1.3;
  }
  .sub {
    font-size: 15px;
    color: #8a929a;
    line-height: 1.5;
    margin-bottom: 8px;
  }
  .sub-es {
    font-size: 13px;
    color: #6b7280;
    line-height: 1.5;
    margin-bottom: 36px;
    font-style: italic;
  }
  .retry {
    display: inline-block;
    background: #C0E863;
    color: #1a1f25;
    font-size: 16px;
    font-weight: 700;
    padding: 14px 48px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    min-height: 48px;
    transition: opacity 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .retry:active { opacity: 0.8; }
</style>
</head>
<body>
  <div class="container">
    <div class="logo">Tribe<span class="dot">.</span></div>
    <span class="icon">📡</span>
    <h1>No internet connection</h1>
    <p class="sub">Please check your connection and try again.</p>
    <p class="sub-es">Sin conexión a internet. Revisa tu conexión e intenta de nuevo.</p>
    <button class="retry" onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
