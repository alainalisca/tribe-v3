<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 210">
  <!-- Blue Chip Staffing LLC — Logo 04: BC Monogram — Inverse (for blue/dark backgrounds) -->

  <!-- Large serif monogram -->
  <text x="198" y="118" text-anchor="end" font-family="Georgia, 'Times New Roman', serif" font-size="120" font-weight="700" fill="#ffffff">B</text>
  <text x="205" y="118" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-size="120" font-weight="700" fill="#93C5FD">C</text>

  <!-- Rule line -->
  <line x1="62" y1="127" x2="338" y2="127" stroke="#ffffff" stroke-width="2" opacity="0.7"/>

  <!-- Wordmark -->
  <text x="200" y="152" text-anchor="middle" font-family="'Arial Black', 'Arial Bold', Arial, sans-serif" font-size="18" font-weight="900" fill="#ffffff" letter-spacing="5">BLUE CHIP</text>
  <text x="200" y="172" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#BFDBFE" letter-spacing="6">STAFFING LLC</text>
</svg>
