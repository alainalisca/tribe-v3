<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <!-- Blue Chip Staffing LLC — Logo 06: True North — Standard -->

  <!-- Outer circle -->
  <circle cx="200" cy="88" r="64" fill="none" stroke="#0D1B35" stroke-width="2.5"/>
  <!-- Inner ring -->
  <circle cx="200" cy="88" r="56" fill="none" stroke="#0D1B35" stroke-width="0.6" opacity="0.2"/>

  <!-- Cardinal tick marks -->
  <!-- E -->
  <line x1="256" y1="88" x2="264" y2="88" stroke="#0D1B35" stroke-width="2" stroke-linecap="round"/>
  <!-- S -->
  <line x1="200" y1="144" x2="200" y2="152" stroke="#0D1B35" stroke-width="2" stroke-linecap="round"/>
  <!-- W -->
  <line x1="136" y1="88" x2="144" y2="88" stroke="#0D1B35" stroke-width="2" stroke-linecap="round"/>
  <!-- N tick (inside, replaced by pointer) -->

  <!-- South arrow (gray) -->
  <polygon points="200,104 196,132 200,126 204,132" fill="#CBD5E1"/>
  <!-- East arrow (gray) -->
  <polygon points="216,88 244,84 238,88 244,92" fill="#CBD5E1"/>
  <!-- West arrow (gray) -->
  <polygon points="184,88 156,84 162,88 156,92" fill="#CBD5E1"/>

  <!-- North arrow (bold navy — the hero direction) -->
  <polygon points="200,26 195,58 200,52 205,58" fill="#0D1B35"/>

  <!-- N label at top -->
  <text x="200" y="20" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif" font-size="11" font-weight="900" fill="#1A56C8" letter-spacing="1">N</text>

  <!-- Center dot -->
  <circle cx="200" cy="88" r="6" fill="#1A56C8"/>
  <circle cx="200" cy="88" r="2.5" fill="#ffffff"/>

  <!-- Wordmark -->
  <text x="200" y="182" text-anchor="middle" font-family="'Arial Black', 'Arial Bold', Arial, sans-serif" font-size="21" font-weight="900" fill="#0D1B35" letter-spacing="4">BLUE CHIP</text>
  <line x1="96" y1="190" x2="152" y2="190" stroke="#64748B" stroke-width="0.8" opacity="0.5"/>
  <line x1="248" y1="190" x2="304" y2="190" stroke="#64748B" stroke-width="0.8" opacity="0.5"/>
  <text x="200" y="206" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#64748B" letter-spacing="5.5">STAFFING LLC</text>
</svg>
